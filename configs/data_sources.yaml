# API key'ler buraya yazilmaz; sadece .env'den okunur (bkz. .env.example).
# Bu dosyada sadece hangi saglayicinin aktif oldugu ve model adi belirtilir.

# YOK Tez Merkezi arama sayfasi bot-dogrulama (CAPTCHA) ile korunuyor, bu nedenle
# otomatik kazima yapilmiyor. Google Scholar ve tez dosyalari elle indirilip
# data/external/<source>/ klasorune konur, kod bu klasoru okuyup RawSample'a cevirir.
human:
  sources: [google_scholar, yok_tez, manual_corpus]
  target_count: 3000
  external_subdirs:
    google_scholar: google_scholar
    yok_tez: yok_tez
    manual_corpus: manual_corpus

# Kisa-metin pilot verisi (bkz. scripts/collect_short_pilot.py, [[project-codebase]] 2026-07-16):
# min_tokens=30 sinirinin ALTINI hic gormeyen modelin bu bolgede OOD/asiri-guvenli
# davranmasini (kisa metinde her zaman "human") duzeltmek icin ayri bir kucuk havuz.
# Ana 3000/sinif veri setine (data/raw/{label}/) DOKUNMAZ, ayri data/raw/{label}_short/
# altina yazilir.
short_pilot:
  target_count_per_class: 300
  target_len_mean: 15
  target_len_std: 6
  target_len_min: 5
  target_len_max: 30
  max_new_tokens: 60       # kisa hedef icin ana veri setinin 4500'una gerek yok, cok daha hizli
  human_min_words: 5
  human_max_words: 30

# Cok-ureticili genelleme takviyesi (bkz. scripts/collect_ai_raw_topup.py, proje notlari
# 2026-07-19): Qwen2.5-7B tek-ureticisine asiri uyum bulundu (canlı testte Claude-yazimi
# AI metni %97+ "human" cikti -- kl_div_word_freq/entropy_2gram gibi ozellikler Qwen'in
# spesifik kelime-dagilim imzasini ogrenmis, genel "AI mi" kavramini degil). Cozum: GPT-4o-mini
# ile ikinci bir uretici eklemek. target_len_* DEGERLERI BILEREK 1750 DEGIL -- insanin
# rechunk edildigi gercek araligi (bkz. target_count_per_class altindaki not) hedefler;
# aksi halde GPT-4o-mini (Qwen'den farkli olarak uzunluk talimatina gercekten uyabildigi icin)
# insan/Qwen ile YENİ bir uzunluk uyumsuzlugu yaratip cozulen confound'u geri getirebilirdi.
cross_generator_topup:
  # 2026-07-19 KREDI TUKENENE KADAR URET: Kullanici hedefi "API key/kredi bitene kadar
  # devam et" olarak belirledi (sabit 1000 degil) -- target_count bilerek yuksek (3000)
  # tutuluyor, gercek durdurucu ANTHROPIC kredisinin tukenmesi (istekler basarisiz olmaya
  # baslayinca calisma sonlandirilacak). checkpoint'li oldugu icin script istenildiginde
  # (kredi bitince) guvenle durdurulabilir, kismi ilerleme kaybolmaz.
  target_count: 3000
  # 2026-07-19 GECERSIZ KALIBRASYON BULGUSU: ilk 49 ornek (hedef 680 sonra 1058) max_tokens=2048
  # yuzunden ~%84 oraninda cumle ortasinda kesilmisti (bkz. generate_with_anthropic docstring,
  # max_tokens artik 8192) -- o olcumler GECERSIZ, hedefi 680'e SIFIRLANDI, max_tokens duzeltmesi
  # sonrasi YENIDEN (kucuk bir pilotla) olculup kalibre edilmeli.
  provider: anthropic
  target_len_mean: 680
  target_len_std: 200
  target_len_min: 100
  target_len_max: 850
  # Pilotta (concurrency=1, rpm=20) 15 istekte hic 429/rate-limit hatasi gorulmedi -- Anthropic
  # hesabinin gercek tavani muhtemelen OpenAI'daki 10 RPM'den daha yuksek (tipik Tier 1 varsayilani
  # ~50 RPM). Yine de asiri agresif gitmemek icin orta bir deger secildi; hata gorulurse dusurulur.
  max_concurrency: 2
  requests_per_minute: 30
  max_retries: 5

# ESKI (GPT-4o-mini, openai) topup kalibrasyonu -- artik cross_generator_topup su an anthropic'e
# isaret ediyor, ama bu degerler openai icin gecerliligini koruyor, provider tekrar openai'ya
# cevrilirse (orn. ai_raw_openai hacmini artirmak icin) BU degerler kullanilmali, yukaridakiler
# DEGIL: target_len_mean=970/std=285/min=140/max=1210 (GPT-4o-mini ~%70 eksik uretim duzeltmesi),
# max_concurrency=2/requests_per_minute=8 (gercek hesap tavani 10 RPM olculmustu).

llm_generators:
  prompts_file: configs/prompts.txt
  openai:
    enabled: true   # 2026-07-19: cok-ureticili genelleme icin ikinci ai_raw kaynagi
                     # (bkz. scripts/collect_ai_raw_topup.py) -- OPENAI_API_KEY .env'de dolu
    model: gpt-4o-mini  # gpt-4-turbo'dan cok daha ucuz (~$0.15/$0.60 vs $10/$30 per 1M token)
    api_key_env: OPENAI_API_KEY
  gemini:
    enabled: false  # ucretsiz katman kota/kapasite sorunlari surekli oldugu icin kapatildi, llama (Ollama) kullaniliyor
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
  anthropic:
    enabled: true   # 2026-07-19: 3. uretici olarak eklendi (canli testte Sonnet-yazimi metnin
                     # %64'u yanlis siniflandirildigi bulundu, bkz. proje notlari)
    model: claude-sonnet-5  # Haiku degil bilerek Sonnet secildi -- gosterilen basarisizlik
                             # Sonnet-seviyesi yazimla oldu (Haiku'nun imzasi farkli olabilirdi)
    api_key_env: ANTHROPIC_API_KEY
  llama:
    enabled: false  # Ollama kaldirildi, transformers saglayicisi kullaniliyor
    model: qwen2.5:7b
    endpoint_env: LLAMA_ENDPOINT
    api_key_env: LLAMA_API_KEY
  transformers:
    enabled: true   # Colab T4/A100 GPU ile calisir, kota/endpoint gerektirmez
    model: Qwen/Qwen2.5-7B-Instruct
    device: auto
    load_in_4bit: false  # A100'de fp16 4-bit'ten daha hizli (40 GB VRAM yeterli, dequant yuku yok); T4'te true'ya donulmeli
    batch_size: 16       # A100 icin; T4 icin 4-8 onerilir

# QuillBot/Wordtune/ParrotAI'nin genel kullanima acik bir API'si yok; ham-AI metinler
# bu araclarin web arayuzunde elle "humanize" edilip data/external/<external_subdir>/
# altina <sample_id>.txt olarak kaydedilir; kod bu klasoru okuyup orijinal ai_raw
# ornegiyle id'den eslestirir. Varsayilan olarak kapali (asagidaki llm.gemini ile
# otomatik humanize kullaniliyor); manuel humanize denenirse enabled: true yapilabilir.
humanizers:
  quillbot:
    enabled: false
    external_subdir: humanized/quillbot
  wordtune:
    enabled: false
    external_subdir: humanized/wordtune
  parrotai:
    enabled: false
    external_subdir: humanized/parrotai
  llm:
    gemini:
      enabled: false  # ucretsiz katman kota/kapasite sorunlari surekli oldugu icin kapatildi
      model: gemini-2.5-flash
      api_key_env: GEMINI_API_KEY
    llama:
      enabled: false  # Ollama kaldirildi
      model: qwen2.5:7b
      endpoint_env: LLAMA_ENDPOINT
      api_key_env: LLAMA_API_KEY
    transformers:
      enabled: false  # backtranslate lehine kapatildi (ai_raw ile AYNI model humanize de
                       # yapinca ai_raw/ai_humanized ayirt edilemez cikiyordu, bkz. proje notlari)
      model: Qwen/Qwen2.5-7B-Instruct
      device: auto
      load_in_4bit: false
      batch_size: 16
    backtranslate:
      enabled: true   # ANA YONTEM: Turkce->Ingilizce->Turkce geri-ceviri (Helsinki-NLP/OPUS-MT,
                       # CC-BY 4.0). QuillBot/Wordtune/ParrotAI'nin API'sizlik/dil-destegi
                       # kisitlari nedeniyle pratik alternatif; ai_raw'dan tamamen farkli bir
                       # mimari (seq2seq ceviri, LLM degil) kullanir.
      tr_en_model: Helsinki-NLP/opus-mt-tc-big-tr-en
      en_tr_model: Helsinki-NLP/opus-mt-tc-big-en-tr
      device: auto

# manual_corpus icin scraping yerine acik lisansli (CC BY-SA), hazir bir Turkce
# korpus (Vikipedi dump'i, Hugging Face uzerinden) indirilir. CAPTCHA/ToS riski yok.
corpus_download:
  wikipedia_tr:
    dataset_name: wikimedia/wikipedia
    dataset_config: "20231101.tr"
    target_count: 1000

target_count_per_class: 3000  # uzunluk-duzeltmesi (human 850 kelimeye rechunk) confound'u %44'e indirdi, onaylandi

rate_limit:
  requests_per_minute: 60
  max_retries: 3
  backoff: exponential
