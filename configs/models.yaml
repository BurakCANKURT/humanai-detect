common:
  random_state: 42
  class_weight: balanced

xgboost:
  max_depth: 3
  min_child_weight: 2
  colsample_bytree: 0.6061695553391381
  eta: 0.16967533607196555
  n_estimators: 585

catboost:
  depth: 6
  learning_rate: 0.1
  iterations: 500
  ordered_boosting: true

mlp:
  hidden_layers: [256, 128, 64]
  activation: relu
  dropout: 0.3
  epochs: 50
  batch_size: 32
  learning_rate: 0.001

logreg:
  penalty: l2
  C: 1.0
  max_iter: 1000

stacking:
  base_models: [xgboost, catboost, mlp, logreg]
  meta_learner: logreg
  passthrough: false

hierarchical:
  stage_a_model: xgboost  # human vs AI
  stage_b_model: xgboost  # ai_raw vs ai_humanized
